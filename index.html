<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>String Diff Tool</title>
  <script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h1>Online String Diff Tool</h1>
    <div class="inputs-row">
      <div class="input-column">
        <div class="toolbar">
          <button type="button" class="toolbar-btn color-btn" onmousedown="event.preventDefault()" onclick="applyBgColor('inputA')">Aa</button>
          <button type="button" class="toolbar-btn" onclick="applyStyle('inputA', 'bold')"><b>B</b></button>
          <button type="button" class="toolbar-btn" onclick="applyStyle('inputA', 'italic')"><i>I</i></button>
          <button type="button" class="toolbar-btn" onclick="applyStyle('inputA', 'underline')"><u>U</u></button>
        </div>
        <div id="inputA" contenteditable="true" class="styled-input" data-placeholder="Enter first string..."></div>
      </div>
      <div class="input-column">
        <div class="toolbar">
          <button type="button" class="toolbar-btn color-btn" onmousedown="event.preventDefault()" onclick="applyBgColor('inputB')">Aa</button>
          <button type="button" class="toolbar-btn" onclick="applyStyle('inputB', 'bold')"><b>B</b></button>
          <button type="button" class="toolbar-btn" onclick="applyStyle('inputB', 'italic')"><i>I</i></button>
          <button type="button" class="toolbar-btn" onclick="applyStyle('inputB', 'underline')"><u>U</u></button>
        </div>
        <div id="inputB" contenteditable="true" class="styled-input" data-placeholder="Enter second string..."></div>
      </div>
    </div>

    <div class="diff-controls">
      <button class="primary" onclick="showDiff()">Show Diff</button>
    </div>

  <div id="diff-output">
    <div class="diff-box" id="diff-left"><b>Deletions</b><br /></div>
    <div class="diff-box" id="diff-right"><b>Additions</b><br /></div>
  </div>
  <script src="diff2.js"></script>
</body>

</html>
